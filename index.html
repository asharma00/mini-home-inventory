<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Home Inventory Tracker</title>

        <link rel="manifest" href="manifest.json" />
        <meta name="theme-color" content="#f7f3e9" />
        <link rel="stylesheet" href="index.css" />
    </head>

    <body>
        <div class="app">
            <h1>🏠 Home Inventory</h1>
            <div class="top-bar">
                <input type="text" id="searchInput" class="search" placeholder="Search items..." />
                <button onclick="clearAll()">Delete All</button>
            </div>

            <div class="form">
                <input type="text" id="itemName" placeholder="Item name" required />
                <input type="number" id="itemQty" placeholder="Qty stored" min="0" required />
                <input type="number" id="itemMin" placeholder="Min" value="1" min="0" required />

                <select id="itemCategory" required>
                    <option value="" disabled selected>Category</option>
                    <option value="toiletry">Toiletry</option>
                    <option value="pantry">Pantry</option>
                    <option value="cleaning">Cleaning</option>
                    <option value="medicine">Medicine</option>
                    <option value="other">Other</option>
                </select>

                <button onclick="addItem()">Add</button>
            </div>

            <div class="inventory" id="inventory"></div>
            <div class="stats" id="stats"></div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
